name: Update Progress

on:
  schedule:
    # 每 6 小时跑一次（避开整点，减少和全网 cron 拥堵）
    - cron: '23 */6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/update_progress.py'
      - '.github/workflows/update-progress.yml'

permissions:
  contents: write

concurrency:
  group: update-progress
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run progress updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: erchoc
        run: python scripts/update_progress.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "no changes, skip"
          else
            git add README.md assets/progress.svg
            git commit -m "chore(progress): auto-update goal progress [skip ci]"
            git push
          fi
